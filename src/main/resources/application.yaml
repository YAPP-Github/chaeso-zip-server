spring:
  application:
    name: chaeso-zip
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/chaeso_zip}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false
    show-sql: ${JPA_SHOW_SQL:false}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:2s}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
    operations-sorter: method
    tags-sorter: alpha
  default-produces-media-type: application/json

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENV:prod}
  traces-sample-rate: ${SENTRY_TRACES:0.1}
  send-default-pii: false
  logging:
    minimum-event-level: error
    minimum-breadcrumb-level: info
  exception-resolver-order: 2147483647

jwt:
  secret: ${JWT_SECRET}
  access-ttl: ${JWT_ACCESS_TTL:PT30M}
  refresh-ttl: ${JWT_REFRESH_TTL:P14D}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  email-verification:
    from: ${EMAIL_VERIFICATION_FROM:no-reply@localhost}
    code-ttl: ${EMAIL_VERIFICATION_CODE_TTL:PT5M}
    verified-ttl: ${EMAIL_VERIFICATION_VERIFIED_TTL:PT30M}
