springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

spring:
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:chaeso-zip;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  mail:
    host: localhost
    port: 1025
  data:
    redis:
      host: localhost
      port: 6379

management:
  health:
    redis:
      enabled: false
    mail:
      enabled: false

jwt:
  secret: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWYwMTIzNDU2Nzg5YWJjZGVm
  access-ttl: PT30M
  refresh-ttl: P14D

app:
  cors:
    allowed-origins: http://localhost:3000
  email-verification:
    from: no-reply@test.com
    code-ttl: PT5M
    verified-ttl: PT30M
