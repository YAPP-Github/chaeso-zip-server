springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

spring:
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:chaeso-zip;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

jwt:
  secret: test-secret-0123456789-0123456789-0123456789
  access-ttl: PT30M
  refresh-ttl: P14D

app:
  cors:
    allowed-origins: http://localhost:3000