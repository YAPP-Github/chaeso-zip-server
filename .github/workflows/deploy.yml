name: CD (deploy on main)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-deploy
  cancel-in-progress: false

env:
  ECR_REPO: chaeso-zip
  AWS_REGION: ap-northeast-2
  INSTANCE_TAG: chaeso-zip-vm

jobs:
  build-push:
    name: Build & push image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy via SSM (keyless)
    needs: build-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy & verify (auto-rollback)
        run: bash .github/scripts/ssm-deploy.sh "${{ github.sha }}"

  notify:
    name: Deploy result → Discord
    needs: [build-push, deploy]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Send deploy result to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BUILD_RESULT: ${{ needs.build-push.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          
          # deploy 성공 = 전체 성공(build-push 성공 전제). 그 외는 취소/실패로 판정.
          if [ "$DEPLOY_RESULT" = "success" ]; then
            COLOR=3066993;  STATUS="✅ 배포 성공"
          elif [ "$BUILD_RESULT" = "cancelled" ] || [ "$DEPLOY_RESULT" = "cancelled" ]; then
            COLOR=9807270;  STATUS="🚫 배포 취소"
          else
            COLOR=15158332; STATUS="❌ 배포 실패"
          fi

          payload=$(jq -n \
            --arg title "${STATUS} — chaeso-zip" \
            --arg url "$RUN_URL" \
            --arg sha "${SHA:0:7}" \
            --arg branch "$BRANCH" \
            --arg actor "$ACTOR" \
            --arg repo "$REPO" \
            --argjson color "$COLOR" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                color: $color,
                fields: [
                  { name: "커밋", value: $sha, inline: true },
                  { name: "브랜치", value: $branch, inline: true },
                  { name: "실행자", value: $actor, inline: true }
                ],
                footer: { text: $repo }
              }]
            }')

          curl -sfSL -X POST -H "Content-Type: application/json" \
            -d "$payload" "$WEBHOOK"