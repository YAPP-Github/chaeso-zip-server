name: Deploy to home server (dev)

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: deploy-home-dev
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/yapp-github/chaeso-zip-server

jobs:
  build-push:
    name: Build & push image (GHCR)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:dev
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy over Tailscale SSH
    needs: build-push
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Join tailnet (ephemeral)
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Deploy
        run: |
          tailscale ssh deploy@jiny-home 'set -e; cd /opt/chaeso-dev; git fetch -q origin dev; git reset --hard -q origin/dev; exec bash .github/scripts/home-dev-sync.sh'
