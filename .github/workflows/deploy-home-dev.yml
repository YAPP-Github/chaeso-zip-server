name: Deploy to home server (dev)

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: deploy-home-dev
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/yapp-github/chaeso-zip-server

jobs:
  build-push:
    name: Build & push image (GHCR)
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:dev
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy over Tailscale SSH
    needs: build-push
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: read
    steps:
      - name: Join tailnet (ephemeral)
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Deploy & verify (auto-rollback)
        env:
          SHA: ${{ github.sha }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "$GHCR_TOKEN" | tailscale ssh deploy@jiny-home "set -e
            docker login ghcr.io -u '$GHCR_USER' --password-stdin
            trap 'docker logout ghcr.io >/dev/null 2>&1' EXIT HUP INT TERM
            cd /opt/chaeso-dev
            git fetch -q origin dev
            git reset --hard -q origin/dev
            bash .github/scripts/home-dev-sync.sh $SHA"

  notify:
    name: Deploy result → Discord
    needs: [build-push, deploy]
    if: always() && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Send deploy result to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_DEV_URL }}
          BUILD_RESULT: ${{ needs.build-push.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ "$DEPLOY_RESULT" = "success" ]; then
            COLOR=3066993;  STATUS="✅ dev 배포 성공"
          elif [ "$BUILD_RESULT" = "cancelled" ] || [ "$DEPLOY_RESULT" = "cancelled" ]; then
            COLOR=9807270;  STATUS="🚫 dev 배포 취소"
          else
            COLOR=15158332; STATUS="❌ dev 배포 실패"
          fi

          payload=$(jq -n \
            --arg title "${STATUS} — chaeso-zip (home)" \
            --arg url "$RUN_URL" \
            --arg sha "${SHA:0:7}" \
            --arg actor "$ACTOR" \
            --arg repo "$REPO" \
            --argjson color "$COLOR" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                color: $color,
                fields: [
                  { name: "커밋", value: $sha, inline: true },
                  { name: "브랜치", value: "dev", inline: true },
                  { name: "실행자", value: $actor, inline: true }
                ],
                footer: { text: $repo }
              }]
            }')

          curl -sfSL -X POST -H "Content-Type: application/json" \
            -d "$payload" "$WEBHOOK"
