name: Claude PR Review

on:
  pull_request:
    types: [opened, reopened]
    branches: [ main, dev ]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    name: Claude Review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build review prompt
        env:
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo 'CLAUDE_PROMPT<<PROMPT_EOF'
            echo "REPO: ${REPO}"
            echo "PR NUMBER: ${PR_NUMBER}"
            echo
            cat .github/claude/pr-review-prompt.md
            echo 'PROMPT_EOF'
          } >> "$GITHUB_ENV"

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ env.CLAUDE_PROMPT }}
          claude_args: |
            --allowedTools "Read,Grep,Glob,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
